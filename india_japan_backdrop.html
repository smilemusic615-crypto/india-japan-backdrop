<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>India-Japan Business Conference - Backdrop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #d9dbe6;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* 750 x 400 wide event backdrop */
  .page {
    position: relative;
    width: 750px;
    height: 400px;
    overflow: hidden;
    background:
      radial-gradient(120% 90% at 10% 6%, rgba(120,108,200,0.16) 0%, rgba(120,108,200,0) 44%),
      radial-gradient(110% 90% at 90% 94%, rgba(76,96,168,0.16) 0%, rgba(76,96,168,0) 46%),
      linear-gradient(135deg, #fbfbfd 0%, #f4f4fa 55%, #eef0f8 100%);
    color: #2b2f5c;
  }

  .wash { position: absolute; border-radius: 50%; filter: blur(40px); opacity: 0.45; pointer-events: none; }
  .wash-tl { top: -110px; left: -90px; width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(150,140,215,0.55), rgba(150,140,215,0)); }
  .wash-br { bottom: -120px; right: -100px; width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(96,118,196,0.5), rgba(96,118,196,0)); }

  /* thin elegant frame */
  .frame { position: absolute; inset: 20px; border: 1px solid rgba(96,108,176,0.35); }
  .frame::before { content: ""; position: absolute; inset: 7px; border: 1px solid rgba(176,150,90,0.45); }

  /* national motifs */
  .motif { position: absolute; pointer-events: none; }
  .motif.sakura { top: 30px; right: 34px; width: 74px; height: 74px; opacity: 0.92; }
  .motif.lotus  { bottom: 28px; left: 32px; width: 86px; height: 64px; opacity: 0.9; }

  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px 70px 26px;
  }

  .top-divider { display: flex; align-items: center; justify-content: center; gap: 14px; width: 320px; margin-bottom: 14px; }
  .top-divider .line { height: 1px; flex: 1; background: linear-gradient(90deg, rgba(96,108,176,0) 0%, rgba(96,108,176,0.7) 100%); }
  .top-divider .line.right { background: linear-gradient(90deg, rgba(96,108,176,0.7) 0%, rgba(96,108,176,0) 100%); }
  .top-divider .dot { width: 7px; height: 7px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #c9542e, #a23f22); box-shadow: 0 0 0 4px rgba(201,84,46,0.12); }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 44px;
    line-height: 1.0;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, #2a356f 0%, #5a4a93 55%, #6f4f9c 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subline { width: 250px; height: 1px; margin: 12px 0 11px;
    background: linear-gradient(90deg, rgba(176,150,90,0), rgba(176,150,90,0.85), rgba(176,150,90,0)); }

  .subtitle { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 600; font-size: 18px; color: #6a5aa0; letter-spacing: 0.3px; }
  .supported { font-weight: 500; font-size: 10px; letter-spacing: 2px; color: #6b6f95; margin-top: 7px; text-transform: uppercase; }

  .logo-band { margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 18px; }
  .logo-slot { width: 116px; height: 38px; border: 1px dashed rgba(96,108,176,0.45); border-radius: 5px;
    display: flex; align-items: center; justify-content: center; color: rgba(96,108,176,0.6);
    font-size: 9px; letter-spacing: 2px; background: rgba(255,255,255,0.35); }

  .details { display: flex; align-items: stretch; justify-content: center; margin-top: 16px; }
  .detail { padding: 0 22px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .detail + .detail { border-left: 1px solid rgba(96,108,176,0.3); }
  .detail .label { font-weight: 700; font-size: 10px; letter-spacing: 4px; color: #a23f22; }
  .detail .value { font-weight: 500; font-size: 12px; color: #2b2f5c; }

  .address { margin-top: 14px; font-weight: 400; font-size: 9.5px; letter-spacing: 0.5px; color: #6b6f95; }
</style>
</head>
<body>
  <!-- data-document-role="page" makes this importable as one Canva page -->
  <div class="page" data-document-role="page" data-label="India-Japan Business Conference Backdrop">
    <div class="wash wash-tl"></div>
    <div class="wash wash-br"></div>

    <!-- Japan motif: cherry blossom (sakura) -->
    <svg class="motif sakura" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <g fill="#f6b6ce" stroke="#ea8fb4" stroke-width="1.4">
        <path d="M50 52 C41 36 43 20 47 11 C48 8 49 6 50 10 C51 6 52 8 53 11 C57 20 59 36 50 52 Z"/>
        <path d="M50 52 C41 36 43 20 47 11 C48 8 49 6 50 10 C51 6 52 8 53 11 C57 20 59 36 50 52 Z" transform="rotate(72 50 50)"/>
        <path d="M50 52 C41 36 43 20 47 11 C48 8 49 6 50 10 C51 6 52 8 53 11 C57 20 59 36 50 52 Z" transform="rotate(144 50 50)"/>
        <path d="M50 52 C41 36 43 20 47 11 C48 8 49 6 50 10 C51 6 52 8 53 11 C57 20 59 36 50 52 Z" transform="rotate(216 50 50)"/>
        <path d="M50 52 C41 36 43 20 47 11 C48 8 49 6 50 10 C51 6 52 8 53 11 C57 20 59 36 50 52 Z" transform="rotate(288 50 50)"/>
      </g>
      <circle cx="50" cy="50" r="5" fill="#f7d774"/>
      <g fill="#eebf52">
        <circle cx="50" cy="42" r="1.4"/><circle cx="57" cy="47" r="1.4"/>
        <circle cx="54" cy="56" r="1.4"/><circle cx="46" cy="56" r="1.4"/><circle cx="43" cy="47" r="1.4"/>
      </g>
    </svg>

    <!-- India motif: lotus flower -->
    <svg class="motif lotus" viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
      <g fill="#bcabe8" stroke="#4e3f86" stroke-width="1.4" stroke-linejoin="round">
        <path d="M60 84 C49 58 52 32 60 18 C68 32 71 58 60 84 Z" transform="rotate(-58 60 84)"/>
        <path d="M60 84 C49 58 52 32 60 18 C68 32 71 58 60 84 Z" transform="rotate(58 60 84)"/>
        <path d="M60 84 C49 58 52 32 60 18 C68 32 71 58 60 84 Z" transform="rotate(-30 60 84)"/>
        <path d="M60 84 C49 58 52 32 60 18 C68 32 71 58 60 84 Z" transform="rotate(30 60 84)"/>
      </g>
      <path d="M60 84 C50 56 53 30 60 14 C67 30 70 56 60 84 Z" fill="#cdbef0" stroke="#4e3f86" stroke-width="1.4" stroke-linejoin="round"/>
    </svg>

    <div class="content">
      <div class="top-divider">
        <span class="line"></span>
        <span class="dot"></span>
        <span class="line right"></span>
      </div>

      <h1 class="title">INDIA-JAPAN<br>BUSINESS CONFERENCE</h1>

      <div class="subline"></div>

      <p class="subtitle">Realizing the &yen;10 trillion Partnership for the next decade</p>
      <p class="supported">Supported by JETRO</p>

      <div class="logo-band">
        <div class="logo-slot">LOGO</div>
        <div class="logo-slot">LOGO</div>
      </div>

      <div class="details">
        <div class="detail">
          <span class="label">&#26085;&#26178;</span>
          <span class="value">Tuesday, 10th March 2026&nbsp;&nbsp;1030&ndash;1200 hrs</span>
        </div>
        <div class="detail">
          <span class="label">&#20250;&#22580;</span>
          <span class="value">Consulate General of India, Fukuoka</span>
        </div>
      </div>

      <p class="address">10th Floor, Fukuoka K Square, 1-3, Nakasu Nakajima, Hakata Ward, Fukuoka 810-0802</p>
    </div>
  </div>
</body>
</html>
