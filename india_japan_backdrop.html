<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>India-Japan Business Conference - Backdrop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #d9dbe6;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* 1920 x 1080 (16:9) wide event backdrop */
  .page {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background:
      radial-gradient(120% 80% at 12% 8%, rgba(120,108,200,0.16) 0%, rgba(120,108,200,0) 42%),
      radial-gradient(110% 80% at 88% 92%, rgba(76,96,168,0.16) 0%, rgba(76,96,168,0) 45%),
      linear-gradient(135deg, #fbfbfd 0%, #f4f4fa 55%, #eef0f8 100%);
    color: #2b2f5c;
  }

  /* soft watercolour corner washes (very restrained) */
  .wash {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.5;
    pointer-events: none;
  }
  .wash-tl { top: -220px; left: -200px; width: 620px; height: 620px;
    background: radial-gradient(circle, rgba(150,140,215,0.55), rgba(150,140,215,0)); }
  .wash-br { bottom: -240px; right: -220px; width: 680px; height: 680px;
    background: radial-gradient(circle, rgba(96,118,196,0.5), rgba(96,118,196,0)); }

  /* thin elegant frame */
  .frame {
    position: absolute;
    inset: 56px;
    border: 1.5px solid rgba(96,108,176,0.35);
  }
  .frame::before {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(176,150,90,0.45); /* subtle gold inner line */
  }

  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
    padding: 150px 180px 110px;
  }

  /* top decorative divider with knot dot */
  .top-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 26px;
    width: 760px;
    margin-bottom: 40px;
  }
  .top-divider .line {
    height: 1.5px;
    flex: 1;
    background: linear-gradient(90deg, rgba(96,108,176,0) 0%, rgba(96,108,176,0.7) 100%);
  }
  .top-divider .line.right {
    background: linear-gradient(90deg, rgba(96,108,176,0.7) 0%, rgba(96,108,176,0) 100%);
  }
  .top-divider .dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #c9542e, #a23f22);
    box-shadow: 0 0 0 7px rgba(201,84,46,0.12);
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 138px;
    line-height: 1.02;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #2a356f 0%, #5a4a93 55%, #6f4f9c 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subline {
    width: 560px;
    height: 1.5px;
    margin: 34px 0 30px;
    background: linear-gradient(90deg, rgba(176,150,90,0) , rgba(176,150,90,0.85), rgba(176,150,90,0));
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 46px;
    color: #6a5aa0;
    letter-spacing: 0.5px;
  }

  .supported {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    font-size: 26px;
    letter-spacing: 3px;
    color: #6b6f95;
    margin-top: 22px;
    text-transform: uppercase;
  }

  /* logo placeholder band */
  .logo-band {
    margin-top: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
  }
  .logo-slot {
    width: 300px;
    height: 110px;
    border: 1.5px dashed rgba(96,108,176,0.45);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(96,108,176,0.6);
    font-size: 18px;
    letter-spacing: 2px;
    background: rgba(255,255,255,0.35);
  }

  /* details row */
  .details {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 0;
    margin-top: 56px;
  }
  .detail {
    padding: 0 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .detail + .detail { border-left: 1.5px solid rgba(96,108,176,0.3); }
  .detail .label {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 24px;
    letter-spacing: 6px;
    color: #a23f22;
  }
  .detail .value {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    font-size: 30px;
    color: #2b2f5c;
  }

  .address {
    position: absolute;
    bottom: 92px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 400;
    font-size: 22px;
    letter-spacing: 1px;
    color: #6b6f95;
  }
</style>
</head>
<body>
  <!-- data-document-role="page" makes this importable as one Canva page -->
  <div class="page" data-document-role="page" data-label="India-Japan Business Conference Backdrop">
    <div class="wash wash-tl"></div>
    <div class="wash wash-br"></div>
    <div class="frame"></div>

    <div class="content">
      <div class="top-divider">
        <span class="line"></span>
        <span class="dot"></span>
        <span class="line right"></span>
      </div>

      <h1 class="title">INDIA-JAPAN<br>BUSINESS CONFERENCE</h1>

      <div class="subline"></div>

      <p class="subtitle">Realizing the &yen;10 trillion Partnership for the next decade</p>
      <p class="supported">Supported by JETRO</p>

      <div class="logo-band">
        <div class="logo-slot">LOGO</div>
        <div class="logo-slot">LOGO</div>
      </div>

      <div class="details">
        <div class="detail">
          <span class="label">&#26085;&#26178;</span>
          <span class="value">Tuesday, 10th March 2026&nbsp;&nbsp;1030&ndash;1200 hrs</span>
        </div>
        <div class="detail">
          <span class="label">&#20250;&#22580;</span>
          <span class="value">Consulate General of India, Fukuoka</span>
        </div>
      </div>
    </div>

    <p class="address">10th Floor, Fukuoka K Square, 1-3, Nakasu Nakajima, Hakata Ward, Fukuoka 810-0802</p>
  </div>
</body>
</html>
